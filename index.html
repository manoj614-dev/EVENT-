<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Event Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14141C;
    --ink-deep: #08080C;
    --paper: #F8F3E7;
    --gold: #D4AF37;
    --gold-light: #E9CE6E;
    --ruby: #A6283C;
    --emerald: #127864;
    --ink-70: rgba(248,243,231,0.72);
    --ink-40: rgba(248,243,231,0.4);

    --font-display: 'Playfair Display', serif;
    --font-body: 'Work Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    margin: 0;
    overflow: hidden;
  }

  .home-page {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, #26262E 0%, var(--ink) 55%, var(--ink-deep) 100%);
    background-size: cover;
    color: var(--paper);
    text-align: center;
    overflow: hidden;
  }

  /* subtle dot-grid texture like a bulletin board */
  .home-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(248,243,231,0.05) 1.5px, transparent 1.5px);
    background-size: 26px 26px;
    pointer-events: none;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    z-index: 2;
    position: relative;
    opacity: 0;
    animation: fadeSlideUp .6s ease .05s forwards;
  }

  .home-page h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 68px;
    letter-spacing: 0.5px;
    font-style: italic;
    margin: 6px 0 46px;
    z-index: 2;
    position: relative;
    opacity: 0;
    animation: fadeSlideUp .7s ease .15s forwards;
  }

  .home-page h1 span {
    color: var(--gold);
  }

  .home-choices {
    display: flex;
    gap: 34px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 2;
    position: relative;
  }

  /* ===== Ticket-shaped choice buttons ===== */
  .ticket-btn {
    position: relative;
    width: 220px;
    padding: 30px 20px 22px;
    border-radius: 16px;
    background: linear-gradient(160deg, #1E1E26, #0C0C10);
    border: 1px solid rgba(212,175,55,0.3);
    color: var(--paper);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.35);
    opacity: 0;
    animation: scaleIn .55s cubic-bezier(.2,.8,.3,1.2) forwards;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }

  .ticket-btn:nth-child(1) { animation-delay: .35s; }
  .ticket-btn:nth-child(2) { animation-delay: .5s; }

  .ticket-btn::before,
  .ticket-btn::after {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--ink-deep);
    top: 50%;
    transform: translateY(-50%);
    box-shadow: inset 0 0 0 9999px var(--ink);
  }
  .ticket-btn::before { left: -11px; }
  .ticket-btn::after { right: -11px; }

  .ticket-btn .icon {
    font-size: 34px;
  }

  .ticket-btn .label {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 27px;
    letter-spacing: 0.5px;
  }

  .ticket-btn .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-70);
    border-top: 1px dashed rgba(248,243,231,0.2);
    padding-top: 10px;
    width: 100%;
    text-align: center;
  }

  .ticket-btn:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: var(--gold);
    box-shadow: 0 20px 40px rgba(0,0,0,0.45), 0 0 0 3px rgba(212,175,55,0.18);
  }

  .ticket-btn:nth-child(2):hover {
    border-color: var(--ruby);
    box-shadow: 0 20px 40px rgba(0,0,0,0.45), 0 0 0 3px rgba(166,40,60,0.25);
  }

  /* ===== Zoom-into-gate transition ===== */
  .home-page.zooming .eyebrow,
  .home-page.zooming h1,
  .home-page.zooming #floatingLayer {
    opacity: 0 !important;
    transition: opacity .3s ease;
  }

  .home-page.zooming .ticket-btn:not(.zoom-active) {
    opacity: 0;
    transition: opacity .3s ease;
  }

  .ticket-btn.zoom-active {
    animation: none !important;
    transform: scale(9);
    border-radius: 50%;
    box-shadow: none;
    z-index: 50;
    transition: transform .6s cubic-bezier(.6,0,.4,1), border-radius .6s ease;
  }

  .ticket-btn.zoom-active .icon,
  .ticket-btn.zoom-active .label,
  .ticket-btn.zoom-active .sub {
    opacity: 0;
    transition: opacity .2s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.82) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ===== Floating background event cards — rising bokeh effect ===== */
  #floatingLayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .float-box {
    position: absolute;
    bottom: -120px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(248,243,231,0.94);
    color: var(--ink);
    border-radius: 9px;
    padding: 8px 14px 8px 10px;
    white-space: nowrap;
    box-shadow: 0 10px 26px rgba(0,0,0,0.3);
    border: 1px solid rgba(212,175,55,0.35);
    opacity: 0;
    animation-name: riseFade;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
  }

  .float-box .float-icon {
    font-size: 20px;
    filter: grayscale(15%);
  }

  .float-box .float-info {
    text-align: left;
    line-height: 1.3;
  }

  .float-box .float-title {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
  }

  .float-box .float-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: #7A7568;
  }

  @keyframes riseFade {
    0%   { transform: translateY(0) scale(var(--s, 1)); opacity: 0; }
    12%  { opacity: var(--o, 0.9); }
    82%  { opacity: var(--o, 0.9); }
    100% { transform: translateY(-118vh) scale(var(--s, 1)); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .eyebrow, .home-page h1, .ticket-btn { animation: none; opacity: 1; }
    .float-box { animation: none; display: none; }
  }
</style>
</head>
<body>

<div class="home-page">
  <div id="floatingLayer"></div>

  <div class="eyebrow">// campus events, one gate at a time</div>
  <h1>Event <span>Register</span></h1>

  <div class="home-choices">
    <a class="ticket-btn" href="student.html" target="_blank" onclick="return zoomIntoGate(event, 'student.html')">
      <span class="icon">🎓</span>
      <span class="label">Student</span>
      <span class="sub">GATE 01 · ENTER</span>
    </a>
    <a class="ticket-btn" href="admin.html" target="_blank" onclick="return zoomIntoGate(event, 'admin.html')">
      <span class="icon">🔐</span>
      <span class="label">Admin</span>
      <span class="sub">GATE 02 · ENTER</span>
    </a>
  </div>
</div>

<script>
let isZooming = false;

function zoomIntoGate(e, url) {
  e.preventDefault();
  if (isZooming) return false;
  isZooming = true;

  const btn = e.currentTarget;
  document.querySelector('.home-page').classList.add('zooming');
  btn.classList.add('zoom-active');

  setTimeout(() => {
    window.open(url, '_blank');
    // reset so the home page is ready next time this tab is used
    document.querySelector('.home-page').classList.remove('zooming');
    btn.classList.remove('zoom-active');
    isZooming = false;
  }, 620);

  return false;
}

const EVENT_ICONS = ["🎉","🎤","🎨","🏆","🎭","🎵","📚","💡","⚽","🎬"];

fetch("/events")
  .then(res => res.json())
  .then(events => {
    if (!events || events.length === 0) {
      // No events -> no floating boxes at all
      return;
    }

    const layer = document.getElementById("floatingLayer");
    // A few rising instances per event so the background stays populated
    const totalBoxes = Math.min(events.length * 2, 14);

    for (let i = 0; i < totalBoxes; i++) {
      const e = events[i % events.length];
      const box = document.createElement("div");
      box.className = "float-box";

      const icon = EVENT_ICONS[i % EVENT_ICONS.length];
      const left = 4 + Math.random() * 88;      // horizontal position, %
      const depth = Math.random();              // 0 = far/small/blurred, 1 = near/large/sharp
      const scale = 0.65 + depth * 0.55;         // 0.65 - 1.2
      const blur = (1 - depth) * 2.2;            // 0 - 2.2px
      const opacity = 0.55 + depth * 0.4;        // 0.55 - 0.95
      const duration = 22 + Math.random() * 16;  // slow, 22-38s
      const delay = -(Math.random() * duration);

      box.style.left = left + "%";
      box.style.setProperty('--s', scale.toFixed(2));
      box.style.setProperty('--o', opacity.toFixed(2));
      box.style.filter = `blur(${blur.toFixed(1)}px)`;
      box.style.zIndex = String(Math.round(depth * 10));
      box.style.animationDuration = duration.toFixed(1) + "s";
      box.style.animationDelay = delay.toFixed(1) + "s";

      box.innerHTML = `
        <span class="float-icon">${icon}</span>
        <span class="float-info">
          <div class="float-title">${e.title || "Event"}</div>
          <div class="float-meta">${e.department || ""}${e.date ? " • " + e.date : ""}</div>
        </span>
      `;

      layer.appendChild(box);
    }
  })
  .catch(() => {
    // backend not reachable / no events -> just show the plain background
  });
</script>

</body>
</html>
