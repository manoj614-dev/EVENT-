<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Event Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --bg-soft: #F6F5F2;
    --surface: rgba(255,255,255,0.7);
    --surface-strong: #FFFFFF;
    --ink: #14161C;
    --ink-70: rgba(20,22,28,0.68);
    --ink-40: rgba(20,22,28,0.4);
    --gold: #B8873D;
    --gold-deep: #92672A;
    --gold-soft: rgba(184,135,61,0.14);
    --ruby: #A6283C;
    --emerald: #0E6E52;
    --line: rgba(20,22,28,0.1);

    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    margin: 0;
    overflow: hidden;
    background: var(--bg);
  }

  .home-page {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% -10%, #FBFAF7 0%, var(--bg) 60%);
    color: var(--ink);
    text-align: center;
    overflow: hidden;
  }

  /* soft pastel aura blobs for premium depth */
  .aurora {
    position: absolute;
    inset: -10%;
    z-index: 0;
    pointer-events: none;
    filter: blur(70px);
    opacity: 0.55;
  }

  .aurora span {
    position: absolute;
    border-radius: 50%;
    animation: auroraDrift 26s ease-in-out infinite;
  }

  .aurora span:nth-child(1) {
    width: 40vw; height: 40vw;
    left: 6%; top: 8%;
    background: radial-gradient(circle, rgba(184,135,61,0.22), transparent 70%);
    animation-duration: 24s;
  }

  .aurora span:nth-child(2) {
    width: 36vw; height: 36vw;
    right: 4%; top: 24%;
    background: radial-gradient(circle, rgba(166,40,60,0.12), transparent 70%);
    animation-duration: 30s;
    animation-delay: -6s;
  }

  .aurora span:nth-child(3) {
    width: 38vw; height: 38vw;
    left: 30%; bottom: -10%;
    background: radial-gradient(circle, rgba(14,110,82,0.14), transparent 70%);
    animation-duration: 34s;
    animation-delay: -14s;
  }

  @keyframes auroraDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(4%, -6%) scale(1.08); }
    66%      { transform: translate(-5%, 4%) scale(0.95); }
  }

  /* fine dot-grid texture */
  .home-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(20,22,28,0.05) 1.3px, transparent 1.3px);
    background-size: 26px 26px;
    mask-image: radial-gradient(circle at 50% 40%, #000 20%, transparent 75%);
    pointer-events: none;
    z-index: 1;
  }

  .hud-corner {
    position: absolute;
    width: 46px;
    height: 46px;
    border: 1.5px solid rgba(184,135,61,0.5);
    z-index: 2;
    opacity: 0.8;
  }
  .hud-corner.tl { top: 22px; left: 22px; border-right: none; border-bottom: none; }
  .hud-corner.tr { top: 22px; right: 22px; border-left: none; border-bottom: none; }
  .hud-corner.bl { bottom: 22px; left: 22px; border-right: none; border-top: none; }
  .hud-corner.br { bottom: 22px; right: 22px; border-left: none; border-top: none; }

  .status-line {
    position: absolute;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--emerald);
    text-transform: uppercase;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeSlideUp .6s ease forwards;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--emerald);
    box-shadow: 0 0 8px rgba(14,110,82,0.6);
    animation: statusBlink 1.6s ease-in-out infinite;
  }

  @keyframes statusBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--gold-deep);
    text-transform: uppercase;
    z-index: 2;
    position: relative;
    opacity: 0;
    animation: fadeSlideUp .6s ease .1s forwards;
  }

  .home-page h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 64px;
    letter-spacing: -0.5px;
    margin: 14px 0 50px;
    z-index: 2;
    position: relative;
    opacity: 0;
    animation: fadeSlideUp .7s ease .2s forwards;
  }

  .home-page h1 span {
    font-style: italic;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-deep));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: holoShift 6s linear infinite;
  }

  @keyframes holoShift {
    from { background-position: 0% 0; }
    to   { background-position: 300% 0; }
  }

  .home-choices {
    display: flex;
    gap: 34px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 2;
    position: relative;
  }

  /* ===== Premium glass gate buttons ===== */
  .ticket-btn {
    position: relative;
    width: 230px;
    padding: 34px 22px 24px;
    border-radius: 14px;
    background: var(--surface-strong);
    border: 1px solid var(--line);
    color: var(--ink);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 14px 34px rgba(20,22,28,0.08), 0 2px 6px rgba(20,22,28,0.04);
    opacity: 0;
    animation: scaleIn .55s cubic-bezier(.2,.8,.3,1.2) forwards, breatheGlow 4s ease-in-out infinite;
    animation-fill-mode: forwards, none;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    overflow: hidden;
    isolation: isolate;
  }

  .ticket-btn:nth-child(1) { animation-delay: .35s, 1.2s; }
  .ticket-btn:nth-child(2) { animation-delay: .5s, 1.5s; }

  @keyframes breatheGlow {
    0%, 100% { box-shadow: 0 14px 34px rgba(20,22,28,0.08), 0 0 0 0 rgba(184,135,61,0); }
    50%      { box-shadow: 0 14px 34px rgba(20,22,28,0.08), 0 0 26px 2px rgba(184,135,61,0.16); }
  }

  .ticket-btn .ring {
    position: absolute;
    inset: -2px;
    border-radius: 16px;
    padding: 2px;
    background: conic-gradient(from 0deg, var(--gold), transparent 30%, transparent 70%, var(--gold));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity .3s ease;
    animation: spinRing 3.5s linear infinite;
    z-index: -1;
  }

  .ticket-btn:hover .ring { opacity: 1; }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .ticket-btn .shine {
    position: absolute;
    top: 0;
    left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(184,135,61,0.12), transparent);
    transform: skewX(-20deg);
    transition: left .6s ease;
    pointer-events: none;
  }

  .ticket-btn:hover .shine { left: 130%; }

  .ticket-btn::before,
  .ticket-btn .notch-right {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    border: 1.5px solid rgba(184,135,61,0.7);
    z-index: 2;
  }
  .ticket-btn::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .ticket-btn .notch-right { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  .ticket-btn .icon {
    font-size: 32px;
    transition: transform .3s ease;
  }

  .ticket-btn:hover .icon {
    transform: scale(1.15) rotate(-4deg);
  }

  .ticket-btn .label {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.2px;
  }

  .ticket-btn .sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-40);
    border-top: 1px dashed var(--line);
    padding-top: 10px;
    width: 100%;
    text-align: center;
  }

  .ticket-btn:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: var(--gold);
    box-shadow: 0 20px 40px rgba(20,22,28,0.12), 0 0 0 3px rgba(184,135,61,0.14);
    animation-play-state: paused, paused;
  }

  .ticket-btn:nth-child(2):hover {
    border-color: var(--ruby);
    box-shadow: 0 20px 40px rgba(20,22,28,0.12), 0 0 0 3px rgba(166,40,60,0.14);
  }

  /* ===== Zoom-into-gate transition ===== */
  .home-page.zooming .eyebrow,
  .home-page.zooming h1,
  .home-page.zooming .status-line,
  .home-page.zooming #floatingLayer {
    opacity: 0 !important;
    transition: opacity .3s ease;
  }

  .home-page.zooming .ticket-btn:not(.zoom-active) {
    opacity: 0;
    transition: opacity .3s ease;
  }

  .ticket-btn.zoom-active {
    animation: none !important;
    transform: scale(9);
    border-radius: 50%;
    box-shadow: none;
    z-index: 50;
    background: var(--gold-soft);
    transition: transform .6s cubic-bezier(.6,0,.4,1), border-radius .6s ease;
  }

  .ticket-btn.zoom-active .icon,
  .ticket-btn.zoom-active .label,
  .ticket-btn.zoom-active .sub,
  .ticket-btn.zoom-active .ring,
  .ticket-btn.zoom-active .shine,
  .ticket-btn.zoom-active .notch-right {
    opacity: 0;
    transition: opacity .2s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.82) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ===== Floating background event cards ===== */
  #floatingLayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .float-box {
    position: absolute;
    bottom: -120px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.92);
    color: var(--ink);
    border-radius: 9px;
    padding: 8px 14px 8px 10px;
    white-space: nowrap;
    box-shadow: 0 10px 26px rgba(20,22,28,0.1);
    border: 1px solid rgba(184,135,61,0.3);
    opacity: 0;
    animation-name: riseFade;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
  }

  .float-box::before {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,135,61,0.25), transparent 70%);
    z-index: -1;
    animation: glowPulseSoft 3.4s ease-in-out infinite;
  }

  @keyframes glowPulseSoft {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50%      { opacity: 0.75; transform: scale(1.15); }
  }

  .float-box .float-icon {
    font-size: 20px;
  }

  .float-box .float-info {
    text-align: left;
    line-height: 1.3;
  }

  .float-box .float-title {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
  }

  .float-box .float-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-40);
  }

  @keyframes riseFade {
    0%   { transform: translate(0, 0) rotate(0deg) scale(var(--s, 1)); opacity: 0; }
    10%  { opacity: var(--o, 0.9); }
    30%  { transform: translate(calc(var(--w, 30px) * 1), -30vh) rotate(var(--r, 3deg)) scale(var(--s, 1)); }
    50%  { transform: translate(calc(var(--w, 30px) * -1), -55vh) rotate(calc(var(--r, 3deg) * -1)) scale(var(--s, 1)); }
    70%  { transform: translate(calc(var(--w, 30px) * 1), -80vh) rotate(var(--r, 3deg)) scale(var(--s, 1)); }
    88%  { opacity: var(--o, 0.9); }
    100% { transform: translate(0, -118vh) rotate(0deg) scale(var(--s, 1)); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .eyebrow, .home-page h1, .ticket-btn, .status-line { animation: none; opacity: 1; }
    .ticket-btn { animation: none !important; }
    .aurora span { animation: none; }
    .float-box { animation: none; display: none; }
    .float-box::before { animation: none; }
    .home-page h1 span { animation: none; background: none; -webkit-text-fill-color: var(--gold-deep); color: var(--gold-deep); }
  }
</style>
</head>
<body>

<div class="home-page">
  <div class="aurora"><span></span><span></span><span></span></div>
  <div id="floatingLayer"></div>

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <div class="status-line"><span class="status-dot"></span>SYSTEM ONLINE</div>

  <div class="eyebrow">// campus events, one gate at a time</div>
  <h1>Event <span>Register</span></h1>

  <div class="home-choices">
    <a class="ticket-btn" href="student.html" target="_blank" onclick="return zoomIntoGate(event, 'student.html')">
      <span class="ring"></span>
      <span class="shine"></span>
      <span class="notch-right"></span>
      <span class="icon">🎓</span>
      <span class="label">Student</span>
      <span class="sub">GATE 01 · ENTER</span>
    </a>
    <a class="ticket-btn" href="admin.html" target="_blank" onclick="return zoomIntoGate(event, 'admin.html')">
      <span class="ring"></span>
      <span class="shine"></span>
      <span class="notch-right"></span>
      <span class="icon">🔐</span>
      <span class="label">Admin</span>
      <span class="sub">GATE 02 · ENTER</span>
    </a>
  </div>
</div>

<script>
let isZooming = false;

function zoomIntoGate(e, url) {
  e.preventDefault();
  if (isZooming) return false;
  isZooming = true;

  const btn = e.currentTarget;
  document.querySelector('.home-page').classList.add('zooming');
  btn.classList.add('zoom-active');

  setTimeout(() => {
    window.open(url, '_blank');
    document.querySelector('.home-page').classList.remove('zooming');
    btn.classList.remove('zoom-active');
    isZooming = false;
  }, 620);

  return false;
}

const EVENT_ICONS = ["🎉","🎤","🎨","🏆","🎭","🎵","📚","💡","⚽","🎬"];

fetch("/events")
  .then(res => res.json())
  .then(events => {
    if (!events || events.length === 0) {
      return;
    }

    const layer = document.getElementById("floatingLayer");
    const totalBoxes = Math.min(events.length * 2, 14);

    for (let i = 0; i < totalBoxes; i++) {
      const e = events[i % events.length];
      const box = document.createElement("div");
      box.className = "float-box";

      const icon = EVENT_ICONS[i % EVENT_ICONS.length];
      const left = 4 + Math.random() * 88;
      const depth = Math.random();
      const scale = 0.65 + depth * 0.55;
      const blur = (1 - depth) * 2.2;
      const opacity = 0.55 + depth * 0.4;
      const duration = 22 + Math.random() * 16;
      const delay = -(Math.random() * duration);
      const wobble = 24 + Math.random() * 46;
      const rotate = 2 + Math.random() * 5;

      box.style.left = left + "%";
      box.style.setProperty('--s', scale.toFixed(2));
      box.style.setProperty('--o', opacity.toFixed(2));
      box.style.setProperty('--w', wobble.toFixed(0) + "px");
      box.style.setProperty('--r', rotate.toFixed(1) + "deg");
      box.style.filter = `blur(${blur.toFixed(1)}px)`;
      box.style.zIndex = String(Math.round(depth * 10));
      box.style.animationDuration = duration.toFixed(1) + "s";
      box.style.animationDelay = delay.toFixed(1) + "s";

      box.innerHTML = `
        <span class="float-icon">${icon}</span>
        <span class="float-info">
          <div class="float-title">${e.title || "Event"}</div>
          <div class="float-meta">${e.department || ""}${e.date ? " • " + e.date : ""}</div>
        </span>
      `;

      layer.appendChild(box);
    }
  })
  .catch(() => {});
</script>

</body>
</html>
