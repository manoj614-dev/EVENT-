<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Event Register</title>
<script>
  (function(){
    try {
      var saved = localStorage.getItem('eventRegisterTheme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1B1B22;
    --ink-deep: #0F0F14;
    --paper: #FFFFFF;
    --bg-hi: #FFFFFF;
    --bg: #FAF8F3;
    --bg-deep: #F3EEE1;
    --gold: #B6893A;
    --gold-light: #DCC07E;
    --ruby: #8E2A3B;
    --emerald: #0D6B56;
    --ink-70: rgba(27,27,34,0.68);
    --ink-40: rgba(27,27,34,0.4);
    --ink-15: rgba(27,27,34,0.10);

    --font-display: 'Playfair Display', serif;
    --font-body: 'Work Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    color-scheme: light;
  }

  :root[data-theme="dark"] {
    --ink: #F1EAD8;
    --ink-deep: #FFFFFF;
    --paper: #1C1C24;
    --bg-hi: #26262E;
    --bg: #14141C;
    --bg-deep: #08080C;
    --gold: #D4AF37;
    --gold-light: #E9CE6E;
    --ruby: #C4495C;
    --emerald: #22A084;
    --ink-70: rgba(241,234,216,0.7);
    --ink-40: rgba(241,234,216,0.42);
    --ink-15: rgba(241,234,216,0.14);

    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    margin: 0;
    overflow: hidden;
  }

  .home-page {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% -10%, var(--bg-hi) 0%, var(--bg) 55%, var(--bg-deep) 100%);
    background-size: cover;
    color: var(--ink);
    text-align: center;
    overflow: hidden;
    transition: background .4s ease, color .35s ease;
  }

  /* ===== Theme toggle ===== */
  .theme-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--ink-15);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 8px 20px -6px rgba(0,0,0,0.25);
    transition: transform .3s cubic-bezier(.2,.8,.3,1.2), background .35s ease, border-color .3s ease;
  }

  .theme-toggle:hover {
    transform: scale(1.08) rotate(-10deg);
    border-color: var(--gold);
  }

  .theme-toggle:active {
    transform: scale(0.92);
  }

  /* slow-drifting aurora blobs for a premium, alive background */
  .aurora {
    position: absolute;
    inset: -10%;
    z-index: 0;
    pointer-events: none;
    filter: blur(70px);
    opacity: 0.55;
  }

  .aurora span {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: multiply;
    animation: auroraDrift 26s ease-in-out infinite;
  }

  :root[data-theme="dark"] .aurora span {
    mix-blend-mode: screen;
  }

  .aurora span:nth-child(1) {
    width: 42vw; height: 42vw;
    left: 8%; top: 10%;
    background: radial-gradient(circle, rgba(182,137,58,0.22), transparent 70%);
    animation-duration: 24s;
  }

  .aurora span:nth-child(2) {
    width: 36vw; height: 36vw;
    right: 6%; top: 25%;
    background: radial-gradient(circle, rgba(142,42,59,0.14), transparent 70%);
    animation-duration: 30s;
    animation-delay: -6s;
  }

  .aurora span:nth-child(3) {
    width: 38vw; height: 38vw;
    left: 32%; bottom: -8%;
    background: radial-gradient(circle, rgba(13,107,86,0.16), transparent 70%);
    animation-duration: 34s;
    animation-delay: -14s;
  }

  @keyframes auroraDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(4%, -6%) scale(1.08); }
    66%      { transform: translate(-5%, 4%) scale(0.95); }
  }

  /* subtle dot-grid texture like a bulletin board */
  .home-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(var(--ink-15) 1.5px, transparent 1.5px);
    background-size: 26px 26px;
    pointer-events: none;
    z-index: 1;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    z-index: 2;
    position: relative;
    opacity: 0;
    animation: fadeSlideUp .6s ease .05s forwards;
  }

  .home-page h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 68px;
    letter-spacing: 0.5px;
    font-style: italic;
    margin: 6px 0 46px;
    z-index: 2;
    position: relative;
    opacity: 0;
    color: var(--ink);
    animation: fadeSlideUp .7s ease .15s forwards;
  }

  .home-page h1 span {
    color: var(--gold);
  }

  .home-choices {
    display: flex;
    gap: 34px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 2;
    position: relative;
  }

  /* ===== Ticket-shaped choice buttons ===== */
  .ticket-btn {
    position: relative;
    width: 220px;
    padding: 30px 20px 22px;
    border-radius: 16px;
    background: var(--paper);
    border: 1px solid var(--ink-15);
    color: var(--ink);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 20px 46px -18px rgba(27,27,34,0.18);
    opacity: 0;
    animation: scaleIn .55s cubic-bezier(.2,.8,.3,1.2) forwards, breatheGlow 4s ease-in-out infinite;
    animation-fill-mode: forwards, none;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease, background .4s ease;
    overflow: hidden;
    isolation: isolate;
  }

  .ticket-btn:nth-child(1) { animation-delay: .35s, 1.2s; }
  .ticket-btn:nth-child(2) { animation-delay: .5s, 1.5s; }

  @keyframes breatheGlow {
    0%, 100% { box-shadow: 0 20px 46px -18px rgba(27,27,34,0.18), 0 0 0 0 rgba(182,137,58,0); }
    50%      { box-shadow: 0 20px 46px -18px rgba(27,27,34,0.18), 0 0 26px 2px rgba(182,137,58,0.16); }
  }

  .ticket-btn .ring {
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    padding: 2px;
    background: conic-gradient(from 0deg, var(--gold), transparent 30%, transparent 70%, var(--gold));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity .3s ease;
    animation: spinRing 3.5s linear infinite;
    z-index: -1;
  }

  .ticket-btn:hover .ring {
    opacity: 1;
  }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  /* shine sweep on hover */
  .ticket-btn .shine {
    position: absolute;
    top: 0;
    left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(182,137,58,0.14), transparent);
    transform: skewX(-20deg);
    transition: left .6s ease;
    pointer-events: none;
  }

  .ticket-btn:hover .shine {
    left: 130%;
  }

  .ticket-btn::before {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    top: 50%;
    left: -11px;
    transform: translateY(-50%);
    background: var(--bg);
    box-shadow: inset 0 0 0 9999px var(--bg), 0 0 0 1px var(--ink-15);
    z-index: 2;
    transition: background .4s ease;
  }

  .ticket-btn .notch-right {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    top: 50%;
    right: -11px;
    transform: translateY(-50%);
    background: var(--bg);
    box-shadow: inset 0 0 0 9999px var(--bg), 0 0 0 1px var(--ink-15);
    z-index: 2;
    transition: background .4s ease;
  }

  .ticket-btn .icon {
    font-size: 34px;
    transition: transform .3s ease;
  }

  .ticket-btn:hover .icon {
    transform: scale(1.15) rotate(-4deg);
  }

  .ticket-btn .label {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 27px;
    letter-spacing: 0.5px;
    color: var(--ink);
  }

  .ticket-btn .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-70);
    border-top: 1px dashed rgba(27,27,34,0.15);
    padding-top: 10px;
    width: 100%;
    text-align: center;
  }

  .ticket-btn:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: var(--gold);
    box-shadow: 0 26px 54px -16px rgba(27,27,34,0.22), 0 0 0 3px rgba(182,137,58,0.14);
    animation-play-state: paused, paused;
  }

  .ticket-btn:nth-child(2):hover {
    border-color: var(--ruby);
    box-shadow: 0 26px 54px -16px rgba(27,27,34,0.22), 0 0 0 3px rgba(142,42,59,0.16);
  }

  /* ===== Zoom-into-gate transition ===== */
  .home-page.zooming .eyebrow,
  .home-page.zooming h1,
  .home-page.zooming #floatingLayer {
    opacity: 0 !important;
    transition: opacity .3s ease;
  }

  .home-page.zooming .ticket-btn:not(.zoom-active) {
    opacity: 0;
    transition: opacity .3s ease;
  }

  .ticket-btn.zoom-active {
    animation: none !important;
    transform: scale(9);
    border-radius: 50%;
    box-shadow: none;
    z-index: 50;
    transition: transform .6s cubic-bezier(.6,0,.4,1), border-radius .6s ease;
  }

  .ticket-btn.zoom-active .icon,
  .ticket-btn.zoom-active .label,
  .ticket-btn.zoom-active .sub,
  .ticket-btn.zoom-active .ring,
  .ticket-btn.zoom-active .shine,
  .ticket-btn.zoom-active .notch-right {
    opacity: 0;
    transition: opacity .2s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.82) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ===== Floating background event cards — rising bokeh effect ===== */
  #floatingLayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .float-box {
    position: absolute;
    bottom: -120px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 9px;
    padding: 8px 14px 8px 10px;
    white-space: nowrap;
    box-shadow: 0 14px 30px -10px rgba(27,27,34,0.16);
    border: 1px solid rgba(182,137,58,0.25);
    opacity: 0;
    animation-name: riseFade;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
  }

  .float-box::before {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(182,137,58,0.22), transparent 70%);
    z-index: -1;
    animation: glowPulseSoft 3.4s ease-in-out infinite;
  }

  @keyframes glowPulseSoft {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50%      { opacity: 0.75; transform: scale(1.15); }
  }

  .float-box .float-icon {
    font-size: 20px;
    filter: grayscale(15%);
  }

  .float-box .float-info {
    text-align: left;
    line-height: 1.3;
  }

  .float-box .float-title {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
  }

  .float-box .float-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-70);
  }

  @keyframes riseFade {
    0%   { transform: translate(0, 0) rotate(0deg) scale(var(--s, 1)); opacity: 0; }
    10%  { opacity: var(--o, 0.9); }
    30%  { transform: translate(calc(var(--w, 30px) * 1), -30vh) rotate(var(--r, 3deg)) scale(var(--s, 1)); }
    50%  { transform: translate(calc(var(--w, 30px) * -1), -55vh) rotate(calc(var(--r, 3deg) * -1)) scale(var(--s, 1)); }
    70%  { transform: translate(calc(var(--w, 30px) * 1), -80vh) rotate(var(--r, 3deg)) scale(var(--s, 1)); }
    88%  { opacity: var(--o, 0.9); }
    100% { transform: translate(0, -118vh) rotate(0deg) scale(var(--s, 1)); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .eyebrow, .home-page h1, .ticket-btn { animation: none; opacity: 1; }
    .ticket-btn { animation: none !important; }
    .aurora span { animation: none; }
    .float-box { animation: none; display: none; }
    .float-box::before { animation: none; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode" title="Toggle theme">
  <span id="themeIcon">🌙</span>
</button>

<div class="home-page">
  <div class="aurora"><span></span><span></span><span></span></div>
  <div id="floatingLayer"></div>

  <div class="eyebrow">// campus events, one gate at a time</div>
  <h1>Event <span>Register</span></h1>

  <div class="home-choices">
    <a class="ticket-btn" href="student.html" target="_blank" onclick="return zoomIntoGate(event, 'student.html')">
      <span class="ring"></span>
      <span class="shine"></span>
      <span class="notch-right"></span>
      <span class="icon">🎓</span>
      <span class="label">Student</span>
      <span class="sub">GATE 01 · ENTER</span>
    </a>
    <a class="ticket-btn" href="admin.html" target="_blank" onclick="return zoomIntoGate(event, 'admin.html')">
      <span class="ring"></span>
      <span class="shine"></span>
      <span class="notch-right"></span>
      <span class="icon">🔐</span>
      <span class="label">Admin</span>
      <span class="sub">GATE 02 · ENTER</span>
    </a>
  </div>
</div>

<script>
function applyThemeIcon(){
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var icon = document.getElementById('themeIcon');
  if(icon) icon.textContent = isDark ? '☀️' : '🌙';
}

function toggleTheme(){
  var root = document.documentElement;
  var isDark = root.getAttribute('data-theme') === 'dark';
  if(isDark){
    root.removeAttribute('data-theme');
    try { localStorage.setItem('eventRegisterTheme', 'light'); } catch(e){}
  } else {
    root.setAttribute('data-theme', 'dark');
    try { localStorage.setItem('eventRegisterTheme', 'dark'); } catch(e){}
  }
  applyThemeIcon();
}

applyThemeIcon();

let isZooming = false;

function zoomIntoGate(e, url) {
  e.preventDefault();
  if (isZooming) return false;
  isZooming = true;

  const btn = e.currentTarget;
  document.querySelector('.home-page').classList.add('zooming');
  btn.classList.add('zoom-active');

  setTimeout(() => {
    window.open(url, '_blank');
    // reset so the home page is ready next time this tab is used
    document.querySelector('.home-page').classList.remove('zooming');
    btn.classList.remove('zoom-active');
    isZooming = false;
  }, 620);

  return false;
}

const EVENT_ICONS = ["🎉","🎤","🎨","🏆","🎭","🎵","📚","💡","⚽","🎬"];

fetch("/events")
  .then(res => res.json())
  .then(events => {
    if (!events || events.length === 0) {
      // No events -> no floating boxes at all
      return;
    }

    const layer = document.getElementById("floatingLayer");
    // A few rising instances per event so the background stays populated
    const totalBoxes = Math.min(events.length * 2, 14);

    for (let i = 0; i < totalBoxes; i++) {
      const e = events[i % events.length];
      const box = document.createElement("div");
      box.className = "float-box";

      const icon = EVENT_ICONS[i % EVENT_ICONS.length];
      const left = 4 + Math.random() * 88;      // horizontal position, %
      const depth = Math.random();              // 0 = far/small/blurred, 1 = near/large/sharp
      const scale = 0.65 + depth * 0.55;         // 0.65 - 1.2
      const blur = (1 - depth) * 2.2;            // 0 - 2.2px
      const opacity = 0.55 + depth * 0.4;        // 0.55 - 0.95
      const duration = 22 + Math.random() * 16;  // slow, 22-38s
      const delay = -(Math.random() * duration);
      const wobble = 24 + Math.random() * 46;    // horizontal S-curve amplitude, px
      const rotate = 2 + Math.random() * 5;      // gentle tilt, deg

      box.style.left = left + "%";
      box.style.setProperty('--s', scale.toFixed(2));
      box.style.setProperty('--o', opacity.toFixed(2));
      box.style.setProperty('--w', wobble.toFixed(0) + "px");
      box.style.setProperty('--r', rotate.toFixed(1) + "deg");
      box.style.filter = `blur(${blur.toFixed(1)}px)`;
      box.style.zIndex = String(Math.round(depth * 10));
      box.style.animationDuration = duration.toFixed(1) + "s";
      box.style.animationDelay = delay.toFixed(1) + "s";

      box.innerHTML = `
        <span class="float-icon">${icon}</span>
        <span class="float-info">
          <div class="float-title">${e.title || "Event"}</div>
          <div class="float-meta">${e.department || ""}${e.date ? " • " + e.date : ""}</div>
        </span>
      `;

      layer.appendChild(box);
    }
  })
  .catch(() => {
    // backend not reachable / no events -> just show the plain background
  });
</script>

</body>
</html>
